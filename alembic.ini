# ═══════════════════════════════════════════════════════════════════
# NEUM LEX COUNSEL — Alembic Configuration
# alembic.ini
#
# USAGE:
#   alembic upgrade head         → Apply all migrations (fresh deploy)
#   alembic upgrade +1           → Apply next migration only
#   alembic downgrade -1         → Roll back last migration
#   alembic downgrade base       → Roll back everything (DANGER)
#   alembic current              → Show current migration version
#   alembic history --verbose    → Show full migration history
#   alembic revision --autogenerate -m "description"  → Generate new migration
#
# NEVER run 'alembic downgrade base' on production.
# ALWAYS test migrations on staging before production.
# Release Governance Protocol: migrations require Super Admin approval.
# ═══════════════════════════════════════════════════════════════════

[alembic]
# Script location — where env.py and versions/ live
script_location = alembic

# File format for new migration revisions
file_template = %%(year)d%%(month)02d%%(day)02d_%%(hour)02d%%(minute)02d_%%(rev)s_%%(slug)s

# Timezone for revision timestamps
timezone = Asia/Dhaka

# Max length for slug in filename
truncate_slug_length = 40

# Output encoding
output_encoding = utf-8

# Alembic will read DATABASE_URL from environment (set in .env).
# Do NOT hardcode credentials here.
# The actual connection is configured in alembic/env.py via pydantic settings.
sqlalchemy.url =

# ── Logging ──────────────────────────────────────────────────────────
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
