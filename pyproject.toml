# =============================================================================
# pyproject.toml — NLC Project Config (pytest + ruff + mypy)
# =============================================================================

[tool.pytest.ini_options]
# ------------------------------------------------------------------
# Test discovery
# ------------------------------------------------------------------
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]

# ------------------------------------------------------------------
# Async mode — all async test functions automatically awaited
# ------------------------------------------------------------------
asyncio_mode = "auto"

# ------------------------------------------------------------------
# Output
# ------------------------------------------------------------------
addopts = [
    "--strict-markers",         # Fail on unknown markers
    "--tb=short",               # Short traceback format
    "--no-header",              # Skip pytest header
    "-ra",                      # Show summary of all non-passing tests
]

# ------------------------------------------------------------------
# Markers
# ------------------------------------------------------------------
markers = [
    "unit: Pure unit tests (no I/O)",
    "integration: Integration tests (requires DB)",
    "rule: Rule engine tests",
    "black: BLACK override rule tests",
    "slow: Slow tests (>5s)",
]

# ------------------------------------------------------------------
# Timeout (prevent hung tests)
# ------------------------------------------------------------------
timeout = 30

# ------------------------------------------------------------------
# Coverage (when running with --cov)
# ------------------------------------------------------------------
[tool.coverage.run]
source = ["app"]
omit = [
    "app/main.py",          # Tested via integration
    "*/migrations/*",
    "*/scripts/*",
    "*/__init__.py",
    "*/conftest.py",
]

[tool.coverage.report]
show_missing = true
skip_covered = false
fail_under = 70
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
    "if __name__ == .__main__.:",
]


# =============================================================================
# Ruff — linter + formatter
# =============================================================================

[tool.ruff]
target-version = "py311"
line-length = 100
src = ["app", "scripts", "tests"]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "UP",   # pyupgrade
    "RUF",  # ruff-specific rules
    "SIM",  # flake8-simplify
    "TCH",  # flake8-type-checking
    "ANN",  # flake8-annotations (partial)
]
ignore = [
    "ANN101",   # Missing self annotation
    "ANN102",   # Missing cls annotation
    "ANN401",   # Any type allowed
    "B008",     # Do not perform function calls in default arguments (FastAPI pattern)
    "E501",     # Line too long (handled by formatter)
    "RUF012",   # Mutable class variables (SQLAlchemy patterns)
]
unfixable = ["B"]   # Don't auto-fix bugbear — too risky

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = [
    "ANN",      # No type annotations required in tests
    "S101",     # assert is fine in tests
]
"scripts/**/*.py" = [
    "ANN",
    "T201",     # print() allowed in scripts
]
"alembic/**/*.py" = [
    "ANN",
    "E402",
]

[tool.ruff.lint.isort]
known-first-party = ["app", "scripts"]
combine-as-imports = true
split-on-trailing-comma = true

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"


# =============================================================================
# Mypy — type checker
# =============================================================================

[tool.mypy]
python_version = "3.11"
strict = false
ignore_missing_imports = true
warn_return_any = true
warn_unused_configs = true
no_implicit_optional = true
check_untyped_defs = true
disallow_any_generics = false
exclude = [
    "alembic/",
    "tests/",
]

[[tool.mypy.overrides]]
module = ["celery.*", "redbeat.*", "boto3.*", "botocore.*", "pyotp.*"]
ignore_missing_imports = true
