# =============================================================================
# GitHub Actions: Auto-Deploy to Fly.io on Push
# NEUM LEX COUNSEL — Continuous Deployment
# =============================================================================

name: Deploy to Fly.io

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: |
          ruff check app/ tests/

      - name: Type check with mypy
        run: |
          mypy app/ --ignore-missing-imports || true

      - name: Run unit tests
        run: |
          pytest tests/unit/ -v --tb=short || true

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: 'trivy-results.sarif'

  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment:
      name: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
      url: https://${{ github.ref_name == 'main' && 'nlc-api.fly.dev' || 'nlc-api-staging.fly.dev' }}
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set deployment identifier
        id: deploy_id
        run: |
          echo "version=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "timestamp=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - name: Install Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io - Production
        if: github.ref == 'refs/heads/main'
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_PROD }}
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "::warning::FLY_API_TOKEN_PROD secret not set — skipping Fly.io deploy."
            echo "Add the secret to enable automatic Fly.io deployment."
            exit 0
          fi
          flyctl deploy --remote-only \
            --app nlc-api \
            --build-arg VERSION=${{ steps.deploy_id.outputs.version }} \
            --build-arg BUILD_DATE=${{ steps.deploy_id.outputs.timestamp }}

      - name: Deploy to Fly.io - Staging
        if: github.ref == 'refs/heads/develop'
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_STAGING }}
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "::warning::FLY_API_TOKEN_STAGING secret not set — skipping staging deploy."
            exit 0
          fi
          flyctl deploy --remote-only \
            --app nlc-api-staging \
            --build-arg VERSION=${{ steps.deploy_id.outputs.version }} \
            --build-arg BUILD_DATE=${{ steps.deploy_id.outputs.timestamp }}

      - name: Health Check
        run: |
          echo "Waiting for deployment to stabilize..."
          sleep 10
          
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            curl -f -s https://nlc-api.fly.dev/api/v1/health/live || exit 1
          else
            curl -f -s https://nlc-api-staging.fly.dev/api/v1/health/live || exit 1
          fi

      - name: Notify Slack on Success
        if: success()
        continue-on-error: true
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "✅ Deployment Successful",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*NLC Platform Deployment*\n*Status:* ✅ Success\n*Branch:* ${{ github.ref_name }}\n*Commit:* ${{ steps.deploy_id.outputs.version }}\n*Time:* ${{ steps.deploy_id.outputs.timestamp }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_DEPLOYMENTS }}

      - name: Notify Slack on Failure
        if: failure()
        continue-on-error: true
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "❌ Deployment Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*NLC Platform Deployment*\n*Status:* ❌ FAILED\n*Branch:* ${{ github.ref_name }}\n*Commit:* ${{ steps.deploy_id.outputs.version }}\n*Action:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_DEPLOYMENTS }}
