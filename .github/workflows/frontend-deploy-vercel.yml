# =============================================================================
# GitHub Actions: Auto-Deploy Frontend to Vercel on Push
# =============================================================================
#
# Required GitHub Secrets:
#   NLC_FRONTEND_PAT  - Fine-grained PAT with read access to nlc_frontend repo
#   VERCEL_TOKEN      - Vercel deploy token
#   VERCEL_ORG_ID     - Vercel org/team ID
#   VERCEL_PROJECT_ID - Vercel project ID for nlc-frontend
#
# =============================================================================

name: Deploy Frontend to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        # Use PAT to checkout the separate private frontend repo.
        # If NLC_FRONTEND_PAT is not yet configured the token falls back to an
        # empty string which will fail — add the secret to unblock this job.
        with:
          repository: nazmulbijoy9105-coder/nlc_frontend
          token: ${{ secrets.NLC_FRONTEND_PAT }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel Production
        id: vercel_deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          DEPLOY_URL=$(vercel deploy \
            --prod \
            --token=$VERCEL_TOKEN \
            --yes 2>&1 | tail -1)
          echo "deploy_url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $DEPLOY_URL"

      - name: Health Check
        run: |
          sleep 20
          TARGET_URL="${{ steps.vercel_deploy.outputs.deploy_url }}"
          if [ -z "$TARGET_URL" ]; then
            TARGET_URL="https://nlc-frontend.vercel.app"
          fi
          echo "Checking: $TARGET_URL"
          curl -f -s --max-time 30 "$TARGET_URL" > /dev/null && \
            echo "Health check passed" || \
            echo "::warning::Health check failed for $TARGET_URL"
