# =============================================================================
# GitHub Actions: Auto-Deploy Frontend to Vercel on Push
# =============================================================================

name: Deploy Frontend to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          repository: nazmulbijoy9105-coder/nlc_frontend
          token: ${{ secrets.NLC_FRONTEND_PAT }}

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel Production
        id: vercel_deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          DEPLOY_URL=$(vercel deploy \
            --prod \
            --token=$VERCEL_TOKEN \
            --yes)
          echo "deploy_url=$DEPLOY_URL" >> $GITHUB_OUTPUT

      - name: Health Check
        run: |
          sleep 15
          curl -f -s ${{ steps.vercel_deploy.outputs.deploy_url }} || \
          curl -f -s https://nlc-frontend.vercel.app || exit 1
