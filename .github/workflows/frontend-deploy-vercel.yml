# =============================================================================
# GitHub Actions: Auto-Deploy Frontend (nlc_frontend) to Vercel
# =============================================================================
#
# Required GitHub Secrets:
#   NLC_FRONTEND_PAT  - Fine-grained PAT with read access to nlc_frontend repo
#   VERCEL_TOKEN      - Your Vercel deploy token (vercel.com → Account Settings → Tokens)
#   VERCEL_ORG_ID     - team_5lVdmnfrsIJ8vVeGDIubLkas
#   VERCEL_PROJECT_ID - prj_qU3TXrWK9ynGAcyu8swbt47qgP5s
#
# Backend URL: https://nlc-platform.onrender.com (Render — auto-deploys from main)
# =============================================================================

name: Deploy Frontend to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  check-secrets:
    name: Check secrets availability
    runs-on: ubuntu-latest
    outputs:
      secrets-available: ${{ steps.check.outputs.available }}
    steps:
      - id: check
        run: |
          if [ -n "${{ secrets.NLC_FRONTEND_PAT }}" ] && [ -n "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "::warning::NLC_FRONTEND_PAT or VERCEL_TOKEN not set — skipping frontend deploy."
            echo "Add: NLC_FRONTEND_PAT and VERCEL_TOKEN in GitHub Settings → Secrets → Actions"
          fi

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: check-secrets
    if: needs.check-secrets.outputs.secrets-available == 'true'

    steps:
      - uses: actions/checkout@v4
        with:
          repository: nazmulbijoy9105-coder/nlc_frontend
          token: ${{ secrets.NLC_FRONTEND_PAT }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel Production
        id: vercel_deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          DEPLOY_URL=$(vercel deploy \
            --prod \
            --token=$VERCEL_TOKEN \
            --yes 2>&1 | tail -1)
          echo "deploy_url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $DEPLOY_URL"

      - name: Health Check
        run: |
          sleep 20
          TARGET_URL="${{ steps.vercel_deploy.outputs.deploy_url }}"
          if [ -z "$TARGET_URL" ]; then
            TARGET_URL="https://nlc-frontend.vercel.app"
          fi
          curl -f -s --max-time 30 "$TARGET_URL" > /dev/null && \
            echo "Frontend health check passed" || \
            echo "::warning::Frontend health check failed for $TARGET_URL"
