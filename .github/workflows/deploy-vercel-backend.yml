# =============================================================================
# GitHub Actions: Deploy NLC Backend API to Vercel (Serverless)
# =============================================================================
#
# To ENABLE this workflow, add these GitHub Secrets:
#   VERCEL_TOKEN              - Vercel deploy token  (vercel.com → Account Settings → Tokens)
#   VERCEL_ORG_ID             - Vercel org/team ID   (Vercel project Settings)
#   VERCEL_BACKEND_PROJECT_ID - Vercel project ID    (Vercel project Settings for this backend)
#
# Environment variables are automatically configured by the "Configure Vercel
# environment variables" step below — no manual Vercel dashboard setup needed.
#
# =============================================================================

name: Deploy Backend to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-backend:
    name: Deploy API to Vercel
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Configure Vercel environment variables
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_BACKEND_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "::warning::VERCEL_TOKEN or VERCEL_BACKEND_PROJECT_ID not set — skipping."
            exit 0
          fi

          set_env() {
            curl -s -X POST "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID/env" \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"key\":\"$1\",\"value\":\"$2\",\"type\":\"encrypted\",\"target\":[\"production\",\"preview\",\"development\"]}" \
              > /dev/null && echo "  Set $1"
          }

          echo "Configuring environment variables..."
          set_env "DATABASE_URL" "postgresql+asyncpg://neondb_owner:npg_c6sEDg3PXFAS@ep-winter-forest-aozont4u-pooler.c-2.ap-southeast-1.aws.neon.tech/neondb?ssl=require"
          set_env "JWT_SECRET_KEY" "${{ secrets.NLC_JWT_SECRET_KEY }}"
          set_env "TOTP_ENCRYPTION_KEY" "${{ secrets.NLC_TOTP_KEY }}"
          set_env "ENVIRONMENT" "production"
          set_env "CELERY_ENABLED" "false"
          set_env "PYTHONPATH" "."
          set_env "AI_PROVIDER" "local_llm"
          set_env "LOG_LEVEL" "INFO"
          set_env "ALLOWED_ORIGINS" "https://nlc-frontend.vercel.app,https://nlc-frontend.coonect.vercel.app,http://localhost:3000"
          set_env "REDIS_URL" "redis://localhost:6379/0"
          set_env "AWS_REGION" "ap-southeast-1"
          set_env "S3_BUCKET_NAME" "nlc-documents"
          set_env "EMAIL_FROM" "compliance@neumlexcounsel.com"
          echo "Environment variables configured."

      - name: Deploy backend to Vercel Production
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_BACKEND_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "::warning::VERCEL_TOKEN or VERCEL_BACKEND_PROJECT_ID secret not set."
            echo "Add both secrets to enable automatic backend Vercel deployment."
            exit 0
          fi
          DEPLOY_URL=$(vercel deploy \
            --prod \
            --token=$VERCEL_TOKEN \
            --yes 2>&1 | tail -1)
          echo "deploy_url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "Backend deployed to: $DEPLOY_URL"

      - name: Health Check
        if: ${{ steps.deploy.outputs.deploy_url != '' }}
        run: |
          sleep 30
          TARGET_URL="${{ steps.deploy.outputs.deploy_url }}/api/v1/health/live"
          echo "Checking backend health: $TARGET_URL"
          curl -f -s --max-time 30 "$TARGET_URL" > /dev/null && \
            echo "Backend health check passed" || \
            echo "::warning::Backend health check failed — check Vercel logs"
