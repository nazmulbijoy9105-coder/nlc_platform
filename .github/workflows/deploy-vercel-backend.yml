# =============================================================================
# DEPRECATED: Backend is deployed on Render, not Vercel.
# Render auto-deploys from the main branch via render.yaml.
# See: https://nlc-platform.onrender.com
#
# To trigger a manual Render deploy, use the Render dashboard or:
#   curl -X POST https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys \
#     -H "Authorization: Bearer $RENDER_API_KEY" -H "Content-Type: application/json"
# =============================================================================

name: Deploy Backend (Render - Auto)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify-backend:
    name: Verify Render Backend Health
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Render deployment
        run: sleep 30

      - name: Health check Render backend
        run: |
          echo "Checking https://nlc-platform.onrender.com/api/v1/health/live"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
              https://nlc-platform.onrender.com/api/v1/health/live)
            if [ "$STATUS" = "200" ]; then
              echo "Backend is healthy (HTTP $STATUS)"
              curl -s https://nlc-platform.onrender.com/api/v1/health/live
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — waiting 30s..."
            sleep 30
          done
          echo "::warning::Backend health check did not return 200 after 5 attempts"
          exit 0
