# =============================================================================
# GitHub Actions: Deploy NLC Backend API to Vercel (Serverless)
# =============================================================================
#
# Deploys the FastAPI/Mangum backend to Vercel on every push to main.
#
# Required GitHub Secrets:
#   VERCEL_TOKEN          - Vercel deploy token
#   VERCEL_ORG_ID         - Vercel org/team ID
#   VERCEL_BACKEND_PROJECT_ID - Vercel project ID for this backend project
#
# Required Vercel Environment Variables (set in Vercel dashboard):
#   DATABASE_URL, JWT_SECRET_KEY, TOTP_ENCRYPTION_KEY,
#   REDIS_URL, ALLOWED_ORIGINS, ENVIRONMENT=production, ...
#
# =============================================================================

name: Deploy Backend to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-backend:
    name: Deploy API to Vercel
    runs-on: ubuntu-latest
    if: ${{ secrets.VERCEL_BACKEND_PROJECT_ID != '' || true }}

    steps:
      - uses: actions/checkout@v4

      - name: Check Vercel secrets
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "::warning::VERCEL_TOKEN not set — skipping backend Vercel deploy."
            exit 0
          fi
          if [ -z "${{ secrets.VERCEL_BACKEND_PROJECT_ID }}" ]; then
            echo "::warning::VERCEL_BACKEND_PROJECT_ID not set — skipping backend Vercel deploy."
            echo "Create a Vercel project linked to this repo, then add the project ID as a secret."
            exit 0
          fi

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy backend to Vercel Production
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_BACKEND_PROJECT_ID }}
        run: |
          DEPLOY_URL=$(vercel deploy \
            --prod \
            --token=$VERCEL_TOKEN \
            --yes 2>&1 | tail -1)
          echo "deploy_url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "Backend deployed to: $DEPLOY_URL"

      - name: Health Check
        run: |
          sleep 20
          TARGET_URL="${{ steps.deploy.outputs.deploy_url }}/api/v1/health/live"
          echo "Checking backend health: $TARGET_URL"
          curl -f -s --max-time 30 "$TARGET_URL" > /dev/null && \
            echo "Backend health check passed" || \
            echo "::warning::Backend health check failed — check Vercel logs"
