# =============================================================================
# Fly.io Production Configuration
# NEUM LEX COUNSEL — NLC Platform Backend
# =============================================================================

app = "nlc-api"
primary_region = "sin"  # Singapore (closest to your users)

# Build configuration
[build]
  dockerfile = "./Dockerfile"
  dockerignore = ".dockerignore"

# Environment variables (non-sensitive)
[env]
  ENVIRONMENT = "production"
  LOG_LEVEL = "INFO"
  AI_PROVIDER = "anthropic"
  AWS_REGION = "ap-south-1"

# HTTP services configuration
[[services]]
  internal_port = 8000
  processes = ["app"]
  protocol = "tcp"
  
  # Port binding
  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true
  
  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]
  
  # Health check for API
  [services.http_checks]
    enabled = true
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/api/v1/health/live"
    protocol = "http"
    restart_limit = 3
    timeout = "5s"

# VM configuration (free tier limits: 1 shared CPU, 256MB RAM)
[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

# Auto-scaling configuration
[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

# PostgreSQL database (managed by Fly.io)
[[postgres]]
  name = "nlc-db"
  plan = "free"
  version = "16"

# Redis cache (managed by Fly.io)
[[redis]]
  name = "nlc-redis"
  plan = "free"

# Monitoring & observability
[metrics]
  port = 9090
  path = "/metrics"

# Logs configuration
[logging]
  enabled = true
  driver = "sumologic"
  level = "info"

# Machine sizing for different workload types
[processes]
  app = "uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"
  worker = "celery -A app.worker.celery_app worker --loglevel=info --concurrency=2 --queues=compliance,notifications,documents,maintenance,default"
  beat = "celery -A app.worker.celery_app beat --loglevel=info --scheduler redbeat.RedBeatScheduler"

# Kill signal & grace period
kill_signal = "SIGTERM"
kill_timeout = "30s"

# Restart policy
restart = "always"
