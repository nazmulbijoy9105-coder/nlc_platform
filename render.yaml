services:
  - type: web
    name: nlc-platform
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    target: api
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: REDIS_URL
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: PORT
        value: 8000
      - key: CORS_ORIGINS
        value: https://nlc-frontend.vercel.app
    healthCheckPath: /api/v1/health
