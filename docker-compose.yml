# =============================================================================
# NEUM LEX COUNSEL — Full Stack docker-compose.yml
# =============================================================================
#
# Services:
#   postgres      — PostgreSQL 16 with persistent volume
#   redis         — Redis 7 (Celery broker + result backend + redbeat)
#   api           — FastAPI application (uvicorn)
#   worker        — Celery task worker (4 queues)
#   beat          — Celery beat scheduler (redbeat, single instance)
#   flower        — Celery monitoring UI (optional, dev only)
#   nginx         — Reverse proxy + rate limiting (production profile)
#
# Profiles:
#   (default)     — postgres, redis, api, worker, beat
#   monitoring    — adds flower
#   production    — adds nginx
#   full          — everything
#
# Usage:
#   Development:        docker compose up
#   With monitoring:    docker compose --profile monitoring up
#   Production:         docker compose --profile production up -d
#   Full (all):         docker compose --profile full up -d
#
# First-time setup:
#   docker compose up -d postgres redis
#   docker compose run --rm api alembic upgrade head
#   docker compose run --rm api python scripts/seed_rules.py
#   docker compose run --rm api python scripts/seed_prompt_templates.py
#   docker compose up -d
# =============================================================================

version: "3.9"

# ---------------------------------------------------------------------------
# Shared config anchors (YAML anchors — avoids repetition)
# ---------------------------------------------------------------------------

x-common-env: &common-env
  env_file:
    - .env

x-app-build: &app-build
  build:
    context: .
    dockerfile: Dockerfile

x-depends-on-ready: &depends-on-ready
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

x-restart-policy: &restart-policy
  restart: unless-stopped

x-logging: &logging
  logging:
    driver: "json-file"
    options:
      max-size: "50m"
      max-file: "5"
      labels: "service"


# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------

networks:
  nlc-internal:
    driver: bridge
    internal: true          # postgres + redis not exposed to host
  nlc-external:
    driver: bridge           # api + nginx can reach internet (AWS SES, AI APIs)


# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  nginx-logs:
    driver: local
  nlc-pdf-tmp:
    driver: local


# =============================================================================
# SERVICES
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 16
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: nlc-postgres
    <<: [*restart-policy, *logging]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nlc_db}
      POSTGRES_USER: ${POSTGRES_USER:-nlc_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Performance tuning for compliance workloads
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    command: >
      postgres
        -c shared_buffers=256MB
        -c effective_cache_size=768MB
        -c maintenance_work_mem=64MB
        -c wal_buffers=16MB
        -c checkpoint_completion_target=0.9
        -c random_page_cost=1.1
        -c work_mem=4MB
        -c max_connections=200
        -c log_min_duration_statement=1000
        -c log_checkpoints=on
        -c log_lock_waits=on
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Optional: mount init scripts (run once on first startup)
      # - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_EXTERNAL_PORT:-5432}:5432"    # Only expose in dev
    networks:
      - nlc-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nlc_user} -d ${POSTGRES_DB:-nlc_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      service: "nlc-postgres"
      component: "database"

  # ---------------------------------------------------------------------------
  # Redis 7
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: nlc-redis
    <<: [*restart-policy, *logging]
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD}
        --maxmemory ${REDIS_MAXMEMORY:-256mb}
        --maxmemory-policy allkeys-lru
        --save 60 1000
        --appendonly yes
        --appendfsync everysec
        --loglevel notice
    volumes:
      - redis-data:/data
    ports:
      - "${REDIS_EXTERNAL_PORT:-6379}:6379"       # Only expose in dev
    networks:
      - nlc-internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      service: "nlc-redis"
      component: "cache-broker"

  # ---------------------------------------------------------------------------
  # FastAPI — Application Server
  # ---------------------------------------------------------------------------
  api:
    <<: [*app-build, *common-env, *depends-on-ready, *restart-policy, *logging]
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: nlc-api
    command: >
      uvicorn app.main:app
        --host 0.0.0.0
        --port 8000
        --workers ${API_WORKERS:-1}
        --proxy-headers
        --forwarded-allow-ips "*"
        --log-level ${LOG_LEVEL:-info}
        --access-log
        --loop uvloop
    volumes:
      - nlc-pdf-tmp:/tmp/nlc_pdfs
      # Dev only: hot reload by mounting source
      # - ./app:/app/app:ro
    ports:
      - "${API_EXTERNAL_PORT:-8000}:8000"
    networks:
      - nlc-internal
      - nlc-external
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      service: "nlc-api"
      component: "application"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M

  # ---------------------------------------------------------------------------
  # Celery Worker — Background Task Processing
  # ---------------------------------------------------------------------------
  worker:
    <<: [*app-build, *common-env, *depends-on-ready, *restart-policy, *logging]
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    container_name: nlc-worker
    command: >
      celery -A app.worker.celery_app worker
        --loglevel=${LOG_LEVEL:-info}
        --concurrency=${CELERY_CONCURRENCY:-4}
        --queues=compliance,notifications,documents,maintenance,default
        --max-tasks-per-child=500
        --max-memory-per-child=262144
        --hostname=worker@%h
        --without-gossip
        --without-mingle
    volumes:
      - nlc-pdf-tmp:/tmp/nlc_pdfs
    networks:
      - nlc-internal
      - nlc-external
    environment:
      - PYTHONUNBUFFERED=1
      - C_FORCE_ROOT=0
    healthcheck:
      test: >
        ["CMD", "python3", "-c",
         "from app.worker.celery_app import celery_app; res=celery_app.control.ping(timeout=5); exit(0 if res else 1)"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 45s
    labels:
      service: "nlc-worker"
      component: "celery-worker"
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "2.0"
        reservations:
          memory: 256M

  # ---------------------------------------------------------------------------
  # Celery Beat — Cron Scheduler
  # IMPORTANT: Only ONE beat instance should ever run.
  # redbeat handles distributed locking, but duplicate instances waste resources.
  # ---------------------------------------------------------------------------
  beat:
    <<: [*app-build, *common-env, *depends-on-ready, *restart-policy, *logging]
    build:
      context: .
      dockerfile: Dockerfile
      target: beat
    container_name: nlc-beat
    command: >
      celery -A app.worker.celery_app beat
        --loglevel=${LOG_LEVEL:-info}
        --scheduler redbeat.RedBeatScheduler
    networks:
      - nlc-internal
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: >
        ["CMD", "python3", "-c",
         "import redis; r=redis.from_url('${REDIS_URL:-redis://:${REDIS_PASSWORD}@redis:6379/0}'); r.ping()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      service: "nlc-beat"
      component: "celery-beat"
    deploy:
      mode: replicated
      replicas: 1       # NEVER scale above 1
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  # ---------------------------------------------------------------------------
  # Flower — Celery Monitoring UI
  # Profile: monitoring (or full)
  # Access: http://localhost:5555
  # ---------------------------------------------------------------------------
  flower:
    <<: [*app-build, *common-env, *depends-on-ready, *restart-policy, *logging]
    build:
      context: .
      dockerfile: Dockerfile
      target: flower
    container_name: nlc-flower
    profiles:
      - monitoring
      - full
    command: >
      celery -A app.worker.celery_app flower
        --port=5555
        --loglevel=info
        --url_prefix=flower
        --basic_auth=${FLOWER_USER:-nlcadmin}:${FLOWER_PASSWORD}
        --max_tasks=1000
        --purge_offline_workers=60
    ports:
      - "${FLOWER_EXTERNAL_PORT:-5555}:5555"
    networks:
      - nlc-internal
    environment:
      - FLOWER_UNAUTHENTICATED_API=false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5555/flower/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      service: "nlc-flower"
      component: "monitoring"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  # ---------------------------------------------------------------------------
  # Nginx — Reverse Proxy + Rate Limiting + TLS Termination
  # Profile: production (or full)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: nlc-nginx
    profiles:
      - production
      - full
    <<: [*restart-policy, *logging]
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx-logs:/var/log/nginx
      # TLS certificates (certbot / Let's Encrypt)
      # - /etc/letsencrypt:/etc/letsencrypt:ro
      # - ./infra/nginx/dhparam.pem:/etc/nginx/dhparam.pem:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - nlc-internal
      - nlc-external
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      service: "nlc-nginx"
      component: "reverse-proxy"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
