# =============================================================================
# NEUM LEX COUNSEL — Nginx Reverse Proxy Configuration
# =============================================================================
#
# Roles:
#   1. TLS termination (Let's Encrypt / certbot)
#   2. Rate limiting (per-IP, per-endpoint sensitivity)
#   3. Security headers (CSP, HSTS, X-Frame-Options, etc.)
#   4. Request routing to FastAPI (api:8000) and Flower (flower:5555)
#   5. HTTP → HTTPS redirect
#   6. Gzip compression
#   7. Static file caching (if applicable)
#
# Rate limit zones:
#   nlc_login     — 10 req/minute per IP (login endpoints)
#   nlc_api       — 200 req/minute per IP (general API)
#   nlc_generate  — 5 req/minute per IP (AI document generation)
#   nlc_admin     — 60 req/minute per IP (admin endpoints)
#
# Usage:
#   Mount at: /etc/nginx/nginx.conf
#   Test:     nginx -t
#   Reload:   nginx -s reload
# =============================================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # -------------------------------------------------------------------------
    # Logging format — structured JSON for log aggregation (ELK, CloudWatch, etc.)
    # -------------------------------------------------------------------------
    log_format json_combined escape=json
        '{'
            '"timestamp":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"request_id":"$http_x_request_id",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"body_bytes":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_time":"$upstream_response_time",'
            '"user_agent":"$http_user_agent",'
            '"x_forwarded_for":"$http_x_forwarded_for"'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    # -------------------------------------------------------------------------
    # Performance
    # -------------------------------------------------------------------------
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 100;
    types_hash_max_size 2048;
    server_tokens off;                # Never expose nginx version

    client_max_body_size 25M;         # Allow document uploads up to 25MB
    client_body_timeout 30s;
    client_header_timeout 10s;
    send_timeout 30s;

    # -------------------------------------------------------------------------
    # Gzip compression
    # -------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        application/json
        application/javascript
        application/xml
        text/plain
        text/css
        text/xml
        image/svg+xml;

    # -------------------------------------------------------------------------
    # Rate limiting zones
    # -------------------------------------------------------------------------

    # Login: tight — 10 req/min per IP with burst of 5
    limit_req_zone $binary_remote_addr zone=nlc_login:10m rate=10r/m;

    # AI document generation: very tight — 5 req/min (expensive AI calls)
    limit_req_zone $binary_remote_addr zone=nlc_generate:10m rate=5r/m;

    # Admin endpoints: moderate — 60 req/min
    limit_req_zone $binary_remote_addr zone=nlc_admin:10m rate=60r/m;

    # General API: generous — 200 req/min
    limit_req_zone $binary_remote_addr zone=nlc_api:20m rate=200r/m;

    # Connection limit per IP (prevents connection floods)
    limit_conn_zone $binary_remote_addr zone=nlc_conn:10m;

    # Rate limit response code
    limit_req_status 429;
    limit_conn_status 429;

    # -------------------------------------------------------------------------
    # Real IP from proxy headers (if behind a load balancer / CDN)
    # -------------------------------------------------------------------------
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # -------------------------------------------------------------------------
    # Upstream: FastAPI
    # -------------------------------------------------------------------------
    upstream nlc_api {
        server api:8000;
        keepalive 32;
        keepalive_requests 100;
        keepalive_timeout 60s;
    }

    # -------------------------------------------------------------------------
    # Upstream: Flower monitoring
    # -------------------------------------------------------------------------
    upstream nlc_flower {
        server flower:5555;
        keepalive 8;
    }

    # =========================================================================
    # Server: HTTP → HTTPS redirect
    # =========================================================================
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # ACME challenge (Let's Encrypt)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            allow all;
        }

        # Everything else → HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # =========================================================================
    # Server: Main HTTPS — NLC API
    # =========================================================================
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name api.neumlexcounsel.com;     # CHANGE: your actual domain

        # -------------------------------------------------------------------------
        # TLS — Let's Encrypt (certbot)
        # Uncomment once certificates are provisioned:
        # ssl_certificate     /etc/letsencrypt/live/api.neumlexcounsel.com/fullchain.pem;
        # ssl_certificate_key /etc/letsencrypt/live/api.neumlexcounsel.com/privkey.pem;
        # -------------------------------------------------------------------------
        # TLS — Self-signed for development (run: make ssl-cert)
        ssl_certificate     /etc/nginx/ssl/nlc.crt;
        ssl_certificate_key /etc/nginx/ssl/nlc.key;

        # TLS hardening
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;
        ssl_stapling on;
        ssl_stapling_verify on;
        # ssl_dhparam /etc/nginx/dhparam.pem;   # Uncomment with dhparam.pem

        # -------------------------------------------------------------------------
        # Security headers
        # -------------------------------------------------------------------------
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy "default-src 'none'; script-src 'none'; connect-src 'self'; img-src 'self' data:; style-src 'self'; base-uri 'self'; form-action 'self';" always;
        # Never cache API responses at nginx level — let FastAPI control Cache-Control headers
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;

        # -------------------------------------------------------------------------
        # Request ID propagation
        # Generate a unique ID if client didn't provide one; pass it upstream
        # -------------------------------------------------------------------------
        set $request_id_header $http_x_request_id;
        if ($request_id_header = "") {
            set $request_id_header $request_id;
        }

        # -------------------------------------------------------------------------
        # Connection limit per IP
        # -------------------------------------------------------------------------
        limit_conn nlc_conn 50;

        # -------------------------------------------------------------------------
        # Health check — no rate limiting, no auth
        # -------------------------------------------------------------------------
        location /api/v1/health {
            proxy_pass http://nlc_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id_header;
            access_log off;    # Don't spam logs with health checks
        }

        # -------------------------------------------------------------------------
        # Auth endpoints — tight rate limiting
        # -------------------------------------------------------------------------
        location /api/v1/auth/login {
            limit_req zone=nlc_login burst=5 nodelay;
            proxy_pass http://nlc_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id_header;
        }

        location /api/v1/auth {
            limit_req zone=nlc_login burst=10 nodelay;
            proxy_pass http://nlc_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id_header;
        }

        # -------------------------------------------------------------------------
        # AI document generation — very tight (expensive + slow)
        # -------------------------------------------------------------------------
        location /api/v1/documents/generate {
            limit_req zone=nlc_generate burst=3 nodelay;
            proxy_pass http://nlc_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id_header;
            # Extended timeout for AI generation
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
        }

        # -------------------------------------------------------------------------
        # Admin endpoints — moderate rate limiting
        # -------------------------------------------------------------------------
        location /api/v1/admin {
            limit_req zone=nlc_admin burst=20 nodelay;
            proxy_pass http://nlc_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id_header;
        }

        # -------------------------------------------------------------------------
        # General API — standard rate limiting
        # -------------------------------------------------------------------------
        location /api/ {
            limit_req zone=nlc_api burst=50 nodelay;
            proxy_pass http://nlc_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";          # Enable keepalive to upstream
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id_header;
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            # Buffer settings for JSON API responses
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
        }

        # -------------------------------------------------------------------------
        # Deny all other paths
        # -------------------------------------------------------------------------
        location / {
            return 404;
        }

        # -------------------------------------------------------------------------
        # Custom error pages
        # -------------------------------------------------------------------------
        error_page 429 /429.json;
        error_page 502 503 504 /50x.json;

        location = /429.json {
            internal;
            default_type application/json;
            return 429 '{"error":true,"status_code":429,"detail":"Too many requests. Please slow down."}';
        }

        location = /50x.json {
            internal;
            default_type application/json;
            return 502 '{"error":true,"status_code":502,"detail":"Service temporarily unavailable. Please try again shortly."}';
        }
    }

    # =========================================================================
    # Server: Flower monitoring UI (internal access only)
    # =========================================================================
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name monitor.neumlexcounsel.com;   # CHANGE: your monitoring subdomain

        ssl_certificate     /etc/nginx/ssl/nlc.crt;
        ssl_certificate_key /etc/nginx/ssl/nlc.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        # Restrict Flower to office IPs only
        # CHANGE: replace with your actual office IP ranges
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        # allow 203.0.113.0/24;    # Example: office IP block
        deny all;

        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Frame-Options "SAMEORIGIN" always;

        location /flower/ {
            proxy_pass http://nlc_flower/flower/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }

        location / {
            return 301 /flower/;
        }
    }
}
