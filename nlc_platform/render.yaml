services:
  - type: web
    name: nlc-platform
    env: python
    region: oregon
    buildCommand: pip install -e .
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: JWT_SECRET_KEY
        value: "change-me-in-production"
