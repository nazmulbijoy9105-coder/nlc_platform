version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: nlc_postgres
    environment:
      POSTGRES_USER: nlc
      POSTGRES_PASSWORD: nlc_password
      POSTGRES_DB: nlc_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nlc"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nlc_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nlc_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=nlc
      - POSTGRES_PASSWORD=nlc_password
      - POSTGRES_DB=nlc_platform
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    env_file:
      - .env

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nlc_celery_worker
    command: celery -A app.worker.celery worker --loglevel=info
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=nlc
      - POSTGRES_PASSWORD=nlc_password
      - POSTGRES_DB=nlc_platform
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - postgres
      - redis
    volumes:
      - ./app:/app/app
    env_file:
      - .env

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nlc_celery_beat
    command: celery -A app.worker.celery beat --loglevel=info
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=nlc
      - POSTGRES_PASSWORD=nlc_password
      - POSTGRES_DB=nlc_platform
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - postgres
      - redis
    volumes:
      - ./app:/app/app
    env_file:
      - .env

  flower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nlc_flower
    command: celery -A app.worker.celery flower --port=5555
    ports:
      - "5555:5555"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
      - celery_worker

volumes:
  postgres_data:
  redis_data:
